name: CI

# Disabled for now — checks run in the release pipeline (release.yml).
# Re-enable the push/pull_request triggers below to run on every change.
on:
  workflow_dispatch:
  # push:
  #   branches: ["main"]
  # pull_request:
  #   branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: vet
        run: go vet ./...

      - name: test
        run: go test -race ./...

      - name: lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  # Verify the cgo-free static build and tests on the other target OSes. Audio
  # output is platform-specific (oto on macOS/Windows, PulseAudio on Linux), so
  # building on real runners catches cross-OS breakage early.
  cross-build:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    env:
      CGO_ENABLED: 0
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: build
        run: go build ./...

      - name: test
        run: go test ./...

  # BSD support is cross-compile-only: no BSD runners exist on GitHub, and the
  # regressions we guard against (#176) are compile failures from non-portable
  # deps, which a build catches without a VM.
  bsd-build:
    name: cross-build (${{ matrix.goos }})
    strategy:
      fail-fast: false
      matrix:
        goos: [freebsd, openbsd, netbsd]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CGO_ENABLED: 0
      GOOS: ${{ matrix.goos }}
      GOARCH: amd64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: build
        run: go build ./...

      - name: vet
        run: go vet ./...
